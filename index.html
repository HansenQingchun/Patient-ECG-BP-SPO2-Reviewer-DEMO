<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中央站 报警数据分析 DEMO</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                    </svg>
                </div>
                <div class="header-title">
                    <h1>中央站 报警数据分析 DEMO</h1>
                    <span class="header-subtitle">Central Station Alarm Data Analysis DEMO</span>
                </div>
            </div>
            <div class="header-right">
                <span class="data-info" id="dataInfo"></span>
                <button class="btn-reupload" id="btnReupload" style="display:none" title="上传新文件">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                    </svg>
                    重新上传
                </button>
            </div>
        </header>

        <!-- Upload Section -->
        <section class="upload-section" id="uploadSection">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">
                    <svg viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                        <polyline points="14,2 14,8 20,8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                        <polyline points="10,9 9,9 8,9"/>
                    </svg>
                </div>
                <h2>上传审计数据文件</h2>
                <p>拖放 <strong>.xlsx</strong> 文件到此处，或点击选择文件</p>
                <p class="upload-hint">支持飞利浦 PIIC iX 监护系统导出的审计数据文件</p>
                <input type="file" id="fileInput" accept=".xlsx,.xls" hidden>
            </div>
        </section>

        <!-- Dashboard -->
        <section class="dashboard" id="dashboard" style="display:none">
            <!-- Tab Navigation -->
            <nav class="tab-nav">
                <button class="tab-btn active" data-tab="overview">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                    报警数据总览
                </button>
                <button class="tab-btn" data-tab="timeseries">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>
                    报警时序分析
                </button>
                <button class="tab-btn" data-tab="arrhythmia">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
                    心律失常报警分析
                </button>
                <button class="tab-btn" data-tab="pressure">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M12 6v6l4 2"/></svg>
                    压力相关报警分析
                </button>
            </nav>

            <!-- Overview Panel -->
            <div class="tab-panel active" id="panel-overview">
                <div class="stats-row" id="overviewStats"></div>
                <div class="charts-grid">
                    <div class="chart-card">
                        <div class="card-header"><h3>报警类别分布</h3></div>
                        <div class="chart-container" id="chart-category-pie"></div>
                    </div>
                    <div class="chart-card">
                        <div class="card-header"><h3>各床位报警数量</h3></div>
                        <div class="chart-container" id="chart-bed-bar"></div>
                    </div>
                    <div class="chart-card">
                        <div class="card-header"><h3>Top 15 报警类型</h3></div>
                        <div class="chart-container" id="chart-top-types"></div>
                    </div>
                    <div class="chart-card">
                        <div class="card-header"><h3>报警严重等级分布</h3></div>
                        <div class="chart-container" id="chart-severity-pie"></div>
                    </div>
                </div>
            </div>

            <!-- Time Series Panel -->
            <div class="tab-panel" id="panel-timeseries">
                <div class="stats-row" id="timeseriesStats"></div>
                <div class="charts-grid">
                    <div class="chart-card chart-wide">
                        <div class="card-header"><h3>每日报警趋势</h3></div>
                        <div class="chart-container chart-tall" id="chart-daily-trend"></div>
                    </div>
                    <div class="chart-card">
                        <div class="card-header"><h3>24小时报警分布</h3></div>
                        <div class="chart-container" id="chart-hourly"></div>
                    </div>
                    <div class="chart-card">
                        <div class="card-header"><h3>每周报警分布</h3></div>
                        <div class="chart-container" id="chart-weekly"></div>
                    </div>
                    <div class="chart-card chart-wide">
                        <div class="card-header"><h3>各类别报警趋势</h3></div>
                        <div class="chart-container chart-tall" id="chart-category-trend"></div>
                    </div>
                </div>
            </div>

            <!-- Arrhythmia Panel -->
            <div class="tab-panel" id="panel-arrhythmia">
                <div class="stats-row" id="arrhythmiaStats"></div>
                <div class="charts-grid">
                    <div class="chart-card">
                        <div class="card-header"><h3>心律失常类型分布</h3></div>
                        <div class="chart-container" id="chart-arr-types"></div>
                    </div>
                    <div class="chart-card">
                        <div class="card-header"><h3>各床位心律失常报警</h3></div>
                        <div class="chart-container" id="chart-arr-bed"></div>
                    </div>
                    <div class="chart-card">
                        <div class="card-header"><h3>心律失常严重等级</h3></div>
                        <div class="chart-container" id="chart-arr-severity"></div>
                    </div>
                    <div class="chart-card">
                        <div class="card-header"><h3>心律失常每日趋势</h3></div>
                        <div class="chart-container" id="chart-arr-trend"></div>
                    </div>
                </div>
            </div>

            <!-- Pressure Panel -->
            <div class="tab-panel" id="panel-pressure">
                <div class="stats-row" id="pressureStats"></div>
                <div class="charts-grid">
                    <div class="chart-card">
                        <div class="card-header"><h3>压力报警类型分布</h3></div>
                        <div class="chart-container" id="chart-prs-types"></div>
                    </div>
                    <div class="chart-card">
                        <div class="card-header"><h3>各床位压力报警</h3></div>
                        <div class="chart-container" id="chart-prs-bed"></div>
                    </div>
                    <div class="chart-card">
                        <div class="card-header"><h3>压力报警严重等级</h3></div>
                        <div class="chart-container" id="chart-prs-severity"></div>
                    </div>
                    <div class="chart-card">
                        <div class="card-header"><h3>压力报警每日趋势</h3></div>
                        <div class="chart-container" id="chart-prs-trend"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loadingOverlay" style="display:none">
            <div class="loading-content">
                <div class="spinner"></div>
                <p id="loadingText">正在加载数据...</p>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
